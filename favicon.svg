<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Offset Shadow for background -->
  <rect x="6" y="6" width="54" height="54" rx="8" fill="#000000" />
  
  <!-- Main Background Card -->
  <rect x="2" y="2" width="54" height="54" rx="8" fill="#F7D53D" stroke="#000000" stroke-width="3" />
  
  <!-- N Letter Box (rotated slightly left) -->
  <g transform="rotate(-6 17 24)">
    <!-- Shadow for N box -->
    <rect x="10" y="14" width="18" height="24" rx="3" fill="#000000" />
    <!-- Main N box (Cyan) -->
    <rect x="8" y="12" width="18" height="24" rx="3" fill="#5CC3D6" stroke="#000000" stroke-width="2.5" />
    <!-- N Letter -->
    <text x="17" y="30" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#000000">N</text>
  </g>

  <!-- K Letter Box (rotated slightly right) -->
  <g transform="rotate(6 41 28)">
    <!-- Shadow for K box -->
    <rect x="34" y="18" width="18" height="24" rx="3" fill="#000000" />
    <!-- Main K box (Pink) -->
    <rect x="32" y="16" width="18" height="24" rx="3" fill="#F06292" stroke="#000000" stroke-width="2.5" />
    <!-- K Letter -->
    <text x="41" y="34" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#000000">K</text>
  </g>
</svg>
